# 1. Cấu hình Server (Spring Boot chạy cổng 8080)
server.port=8080

# 2. Cấu hình Data Source (Kết nối tới MySQL trên Docker qua cổng 3307)
# Lưu ý: "htql_thi" phải khớp với MYSQL_DATABASE trong file docker-compose
spring.datasource.url=jdbc:mysql://localhost:3307/htql_thi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình JPA / Hibernate
# Tự động tạo bảng (update) dựa trên các Entity (@Entity) đã khai báo
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# (Tùy chọn) 4. Cấu hình kích thước file upload (cho Import Excel)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB