# 1. Cấu hình Server (Render sẽ cấp Port qua biến môi trường)
server.port=${PORT:8080}

# 2. Cấu hình Data Source (Kết nối tới MySQL trên Clever Cloud)
# Thay <PASSWORD_THAT> bằng mật khẩu bạn lấy từ web (bấm vào biểu tượng cái khóa)
spring.datasource.url=jdbc:mysql://localhost:3306/htql_thi?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=admin
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# 4. Cấu hình kích thước file upload (Giữ nguyên cho Import Excel)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.datasource.hikari.maximum-pool-size=2